<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trader's Guardian — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #00c8e0;
      --accent-hover: #00b0c8;
      --text: #f0f0f0;
      --muted: #888;
      --input-bg: #222;
      --error: #ff4d6a;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,224,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,224,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,200,224,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo area ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-wrap {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 32px rgba(0,200,224,0.35);
      overflow: hidden;
      /* ── PNG LOGO SLOT ──
         To use your own logo, replace the <svg> below with:
         <img src="your-logo.png" alt="Logo" style="width:100%;height:100%;object-fit:cover;">
         Or set background-image: url('your-logo.png'); background-size: cover; and remove the inner SVG.
      */
    }

    .logo-wrap svg {
      width: 34px;
      height: 34px;
      stroke: #0d0d0d;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .brand p {
      font-size: 0.875rem;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #ccc;
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.92rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: #555; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,200,224,0.12);
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 2px;
    }
    .toggle-pw:hover { color: var(--accent); }

    .forgot {
      text-align: right;
      margin-top: -8px;
    }
    .forgot a {
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    .error-msg {
      font-size: 0.78rem;
      color: var(--error);
      display: none;
      margin-top: -10px;
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 20px rgba(0,200,224,0.3);
    }

    .btn-primary:active { transform: scale(0.98); }

    .btn-primary.loading .btn-text { opacity: 0; }
    .btn-primary .spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
    }
    .btn-primary.loading .spinner { display: flex; }

    .spinner svg {
      width: 22px; height: 22px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .register-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .register-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .register-link a:hover { text-decoration: underline; }

    /* Help button */
    .help-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s;
    }
    .help-btn:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>

<div class="container">
  <div class="brand">
    <!-- ══════════════════════════════════════════════════
         LOGO SLOT — replace the SVG below with your PNG:

         Option A (img tag):
           <img src="logo.png" alt="Logo" style="width:100%;height:100%;object-fit:cover;">

         Option B (CSS background):
           Remove the SVG, add to .logo-wrap style:
           background-image: url('logo.png');
           background-size: cover;
           background-color: transparent;
    ══════════════════════════════════════════════════ -->

    <div class="logo-wrap">
        <!-- Replace the <svg> with: -->
        <img src="your-logo.png" alt="Logo" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24">
        <polyline points="3 17 9 11 13 15 21 7"/>
        <polyline points="14 7 21 7 21 14"/>
      </svg>
    </div>

    <h1>Trader's Guardian</h1>
    <p>Sign in to your trading account</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="trader@example.com" autocomplete="email"/>
      <span class="error-msg" id="email-err">Please enter a valid email.</span>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" type="button" aria-label="Toggle password" onclick="togglePw('password', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="error-msg" id="pw-err">Password is required.</span>
    </div>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
      <span class="btn-text">Login</span>
      <span class="spinner">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0d" stroke-width="2.5">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </span>
    </button>

    <div class="divider">or</div>

    <p class="register-link">Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>

<button class="help-btn" title="Help">?</button>

<script>
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const isHidden = inp.type === 'password';
    inp.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }

  function showError(id, show) {
    document.getElementById(id).style.display = show ? 'block' : 'none';
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    showError('email-err', !emailOk);
    if (!emailOk) valid = false;

    showError('pw-err', !password);
    if (!password) valid = false;

    if (!valid) return;

    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      // ── API CALL ──────────────────────────────────────
      // Replace the URL and adjust headers/body to your backend.
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.message || 'Invalid credentials. Please try again.');
      } else {
        const data = await res.json();
        // Store token and redirect
        if (data.token) localStorage.setItem('tg_token', data.token);
        window.location.href = data.redirect || '/dashboard';
      }
    } catch (err) {
      alert('Network error. Please check your connection.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
